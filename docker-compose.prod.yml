# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  backend:
    volumes: []
    network_mode: host
    ports: !reset []
    depends_on: !reset {}
    command: bash -c "sleep 10 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-moneybot}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-moneybot}
      REDIS_URL: redis://127.0.0.1:6379/0
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      SOCKS_PROXY: ${SOCKS_PROXY:-}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  worker:
    volumes: []
    network_mode: host
    ports: !reset []
    depends_on: !reset {}
    command: bash -c "sleep 15 && python -m worker.main"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-moneybot}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-moneybot}
      REDIS_URL: redis://127.0.0.1:6379/0
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SOCKS_PROXY: ${SOCKS_PROXY:-}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  frontend:
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    volumes:
      - /app/node_modules
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  nginx:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  postgres:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
